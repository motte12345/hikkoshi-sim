<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ページが見つかりません - 引越し費用シミュレーター</title>
  <script>
    // SPA fallback: redirect to index.html with the path preserved
    // This enables client-side routing on Cloudflare Pages
    sessionStorage.setItem('redirect', window.location.pathname);
    window.location.replace('/');
  </script>
</head>
<body>
  <p>リダイレクト中...</p>
</body>
</html>
